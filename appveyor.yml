# Varian CI / release — AppVeyor (Linux).
# Builds the hardened `vn` toolchain, runs the full test suite, and packages a
# release tarball. On a pushed git tag, it publishes the tarball to a GitHub
# Release (see the `deploy:` section for the one-time token setup).

version: 0.1.0-{build}
image: Ubuntu2204
clone_depth: 1

environment:
  # Tests allocate-and-leak intentionally in a few spots; don't fail on that.
  ASAN_OPTIONS: detect_leaks=0

install:
  - sh: sudo apt-get update -qq
  - sh: >
      sudo apt-get install -y -qq
      build-essential
      libffi-dev
      libcurl4-openssl-dev
      libpq-dev
      libssl-dev
      libsqlite3-dev
      libhiredis-dev
      liburing-dev

build_script:
  # Hardened, optimized build (-O2, FORTIFY, stack protector, RELRO, PIE).
  # Produces both `vn` and `libvarian.a` (the latter is needed for `vn build --release`).
  - sh: make -j$(nproc) release

test_script:
  - sh: |
      set -e
      ulimit -c 0
      echo "── vn unit/integration tests ──"
      ./vn test tests/
      echo "── package + namespacing integration suites ──"
      bash tests/pkg_manager_test.sh
      bash tests/pkg_manager_c3_test.sh
      bash tests/use_package_test.sh
      bash tests/namespacing_test.sh

after_test:
  # Package a self-contained release: the binary, the static runtime library
  # and headers (for `vn build --release`), and the standard-library prelude.
  - sh: |
      set -e
      PKG=varian-linux-x64
      rm -rf dist && mkdir -p dist/$PKG
      cp vn libvarian.a dist/$PKG/
      cp -r include vn_modules dist/$PKG/
      cp README.md LICENSE dist/$PKG/ 2>/dev/null || true
      tar -czf $PKG.tar.gz -C dist $PKG
      sha256sum $PKG.tar.gz | tee $PKG.tar.gz.sha256

artifacts:
  - path: varian-linux-x64.tar.gz
    name: varian-linux-x64
  - path: varian-linux-x64.tar.gz.sha256
    name: varian-linux-x64-sha256

# ── GitHub Release on tag ──
# One-time setup (no GitHub Actions needed):
#   1. Create a GitHub personal access token with the `public_repo` scope.
#   2. In AppVeyor: Account → Encrypt YAML → paste the token → copy the result
#      into `auth_token.secure` below (or set GITHUB_TOKEN as a secure env var
#      in the project settings and use `auth_token: $(GITHUB_TOKEN)`).
#   3. Cut a release:  git tag v0.1.0 && git push origin v0.1.0
deploy:
  - provider: GitHub
    description: 'Varian $(APPVEYOR_REPO_TAG_NAME)'
    auth_token:
      secure: REPLACE_WITH_APPVEYOR_ENCRYPTED_GITHUB_TOKEN
    artifact: varian-linux-x64, varian-linux-x64-sha256
    draft: false
    prerelease: false
    force_update:     true
    on:
      APPVEYOR_REPO_TAG: true
