# AppVeyor CI — multi-platform build + release.
# Builds the `vn` toolchain on Linux, macOS, and Windows.
# On a pushed tag, uploads all platform artifacts to a GitHub Release.
#
# Setup (one-time):
#   1. https://ci.appveyor.com/ → Log in with GitHub → New Project → pick Chidi09/VarianLang
#   2. Settings → Environment → add secret: GITHUB_TOKEN
#   3. Push a tag — AppVeyor picks it up automatically.

skip_non_tags: true
clone_depth: 1

image:
  - Ubuntu2204
  - macos-ventura
  - Visual Studio 2022

environment:
  GITHUB_TOKEN: $(GITHUB_TOKEN)
  CCACHE_DIR: /tmp/ccache

cache:
  # ccache speeds up rebuilds when only a few files change
  - /tmp/ccache -> Makefile
  - C:\ccache -> Makefile
  # Prebuilt dependencies on Windows (sqlite3, hiredis, libpq)
  - C:\deps -> .appveyor.yml
  # Homebrew bottles (macOS) — avoid rebuilding formulas every time
  - /usr/local/Homebrew/Library/Taps -> .appveyor.yml
  - /Users/appveyor/Library/Caches/Homebrew -> .appveyor.yml

# ─── Linux ────────────────────────────────────────────────────────────
for:
  -
    matrix:
      only:
        - image: Ubuntu2204
    install:
      - sh: sudo apt-get update -qq
      - sh: sudo apt-get install -y -qq ccache
      - sh: >
          sudo apt-get install -y -qq
          build-essential
          libffi-dev
          libcurl4-openssl-dev
          libpq-dev
          libssl-dev
          libsqlite3-dev
          libhiredis-dev
          liburing-dev
    build_script:
      - sh: make CC="ccache gcc" -j$(nproc) release
    after_build:
      - sh: |
          set -e
          PKG=varian-linux-x64
          rm -rf dist && mkdir -p dist/$PKG
          cp vn libvarian.a dist/$PKG/
          cp -r include vn_modules dist/$PKG/
          cp README.md LICENSE dist/$PKG/ 2>/dev/null || true
          tar -czf $PKG.tar.gz -C dist $PKG
          sha256sum $PKG.tar.gz | tee $PKG.tar.gz.sha256

          # Upload to GitHub Release (create if not exists)
          TAG="$APPVEYOR_REPO_TAG_NAME"
          if [ -z "$TAG" ]; then echo "No tag — skipping upload"; exit 0; fi

          REL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$APPVEYOR_REPO_NAME/releases/tags/$TAG")
          if echo "$REL" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('message')=='Not Found' else 1)" 2>/dev/null; then
            REL=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"Varian v${TAG#v} — compiled, concurrent, batteries-included language.\\n\\nDownloads:\\n- varian-linux-x64.tar.gz — Linux binary + toolchain\\n- varian-macos-x64.tar.gz — macOS binary + toolchain\\n- varian-windows-x64.zip — Windows binary + toolchain\\n\\nSee README.md and docs/ for full reference.\"}" \
              "https://api.github.com/repos/$APPVEYOR_REPO_NAME/releases")
          fi
          REL_ID=$(echo "$REL" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null)
          if [ -z "$REL_ID" ]; then
            echo "Failed to get release ID. API response:"
            echo "$REL" | head -c 2000
            exit 1
          fi

          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/gzip" \
            --data-binary @"$PKG.tar.gz" \
            "https://uploads.github.com/repos/$APPVEYOR_REPO_NAME/releases/$REL_ID/assets?name=$PKG.tar.gz"
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @"$PKG.tar.gz.sha256" \
            "https://uploads.github.com/repos/$APPVEYOR_REPO_NAME/releases/$REL_ID/assets?name=$PKG.tar.gz.sha256"
          echo "Linux release uploaded."

  # ─── macOS ──────────────────────────────────────────────────────────
  -
    matrix:
      only:
        - image: macos-ventura
    install:
      # Stop Homebrew from upgrading the world (cmake/powershell/.NET take >30 min).
      - sh: export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_UPGRADE=1
      # libcurl and libsqlite3 are provided by macOS; libpq is the lightweight client.
      - sh: brew install ccache libffi openssl hiredis libpq
    build_script:
      - sh: make CC="ccache gcc" -j$(sysctl -n hw.logicalcpu) release
    after_build:
      - sh: |
          set -e
          PKG=varian-macos-x64
          rm -rf dist && mkdir -p dist/$PKG
          cp vn libvarian.a dist/$PKG/ 2>/dev/null || true
          cp -r include vn_modules dist/$PKG/
          cp README.md LICENSE dist/$PKG/ 2>/dev/null || true
          tar -czf $PKG.tar.gz -C dist $PKG
          shasum -a 256 $PKG.tar.gz | tee $PKG.tar.gz.sha256

          TAG="$APPVEYOR_REPO_TAG_NAME"
          [ -z "$TAG" ] && exit 0
          REL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$APPVEYOR_REPO_NAME/releases/tags/$TAG")
          REL_ID=$(echo "$REL" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null)
          [ -z "$REL_ID" ] && { echo "No release found"; exit 1; }
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/gzip" \
            --data-binary @"$PKG.tar.gz" \
            "https://uploads.github.com/repos/$APPVEYOR_REPO_NAME/releases/$REL_ID/assets?name=$PKG.tar.gz"
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @"$PKG.tar.gz.sha256" \
            "https://uploads.github.com/repos/$APPVEYOR_REPO_NAME/releases/$REL_ID/assets?name=$PKG.tar.gz.sha256"
          echo "macOS release uploaded."

  # ─── Windows ────────────────────────────────────────────────────────
  -
    matrix:
      only:
        - image: Visual Studio 2022
    environment:
      CCACHE_DIR: C:\ccache
    install:
      - cmd: choco install mingw make curl openssl 2>nul || ver>nul
      # ccache speeds rebuilds; transient Chocolatey timeouts are non-fatal
      - cmd: choco install ccache 2>nul || ver>nul
      - ps: |
          $ErrorActionPreference = "Stop"
          $mingw = "C:\ProgramData\mingw64\mingw64\bin"
          $env:PATH = "$mingw;C:\ProgramData\chocolatey\bin;$env:PATH"
          $deps = "C:\deps"
          md $deps -Force | Out-Null

          # ── SQLite3 amalgamation ──
          Write-Host "Building SQLite3..."
          curl.exe -sL https://www.sqlite.org/2026/sqlite-amalgamation-3530200.zip -o "$deps\sqlite.zip"
          Expand-Archive -Path "$deps\sqlite.zip" -DestinationPath "$deps\sqlite" -Force
          $sqlite_src = (Get-ChildItem "$deps\sqlite" -Directory | Select-Object -First 1).FullName
          gcc -c "$sqlite_src\sqlite3.c" -o "$deps\sqlite3.o"
          ar rcs "$deps\libsqlite3.a" "$deps\sqlite3.o"
          Copy-Item "$sqlite_src\sqlite3.h" "$deps\"
          Write-Host "SQLite3 done."

          # ── hiredis ──
          Write-Host "Building hiredis..."
          curl.exe -sL https://github.com/redis/hiredis/archive/refs/tags/v1.2.0.tar.gz -o "$deps\hiredis.tar.gz"
          md "$deps\hiredis_tmp" -Force | Out-Null
          tar -xzf "$deps\hiredis.tar.gz" -C "$deps\hiredis_tmp"
          $hiredis_dir = (Get-ChildItem "$deps\hiredis_tmp" -Directory | Select-Object -First 1).FullName
          Push-Location $hiredis_dir
          foreach ($cf in @("alloc.c","hiredis.c","net.c","sds.c","read.c","async.c")) {
            $of = "$deps\$($cf.Replace('.c','.o'))"
            gcc -c "$cf" -o "$of"
          }
          ar rcs "$deps\libhiredis.a" "$deps\alloc.o" "$deps\hiredis.o" "$deps\net.o" "$deps\sds.o" "$deps\read.o" "$deps\async.o"
          Pop-Location
          md "$deps\hiredis\include" -Force | Out-Null
          Copy-Item "$hiredis_dir\*.h" "$deps\hiredis\include\"
          Write-Host "hiredis done."

          # ── libpq (PostgreSQL client) ──
          Write-Host "Setting up libpq..."
          curl.exe -sL https://get.enterprisedb.com/postgresql/postgresql-16.2-1-windows-x64-binaries.zip -o "$deps\pg.zip"
          Expand-Archive -Path "$deps\pg.zip" -DestinationPath "$deps\pg" -Force
          $pg_dll = Get-ChildItem "$deps\pg" -Recurse -File | Where-Object { $_.Name -eq 'libpq.dll' } | Select-Object -First 1
          if (-not $pg_dll) { throw "libpq.dll not found in PostgreSQL zip" }
          $pg_bin = $pg_dll.DirectoryName
          $pg_root = (Get-Item $pg_bin).Parent.FullName
          md "$deps\pg\include" -Force | Out-Null
          md "$deps\pg\lib" -Force | Out-Null
          Copy-Item "$pg_root\include\*.h" "$deps\pg\include\"
          Copy-Item $pg_dll.FullName "$deps\pg\lib\" -Force
          Copy-Item $pg_dll.FullName "$deps\" -Force
          Push-Location $pg_bin
          gendef libpq.dll 2>$null
          dlltool -d libpq.def -l "$deps\pg\lib\libpq.a" -k 2>$null
          Pop-Location
          Write-Host "libpq done."

          Write-Host "All dependencies installed to $deps"
    build_script:
      # Chocolatey updates PATH but the current cmd shell doesn't see it; add MinGW manually.
      # Use ccache if available, fall back to gcc if Chocolatey was flaky.
      - cmd: set "PATH=C:\ProgramData\mingw64\mingw64\bin;C:\ProgramData\chocolatey\bin;%PATH%" && where ccache >nul 2>nul && mingw32-make CC="ccache gcc" -j%NUMBER_OF_PROCESSORS% release || mingw32-make -j%NUMBER_OF_PROCESSORS% release
    after_build:
      - ps: |
          $PKG = "varian-windows-x64"
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "dist/$PKG" | Out-Null
          Copy-Item vn.exe "dist/$PKG/" -ErrorAction SilentlyContinue
          Copy-Item libvarian.a "dist/$PKG/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse include "dist/$PKG/include" -ErrorAction SilentlyContinue
          Copy-Item -Recurse vn_modules "dist/$PKG/vn_modules"
          Copy-Item README.md "dist/$PKG/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "dist/$PKG/" -ErrorAction SilentlyContinue

          # Bundle runtime DLLs so vn.exe works standalone
          $dll_dirs = @(
            "C:\ProgramData\mingw64\mingw64\bin"              # MinGW runtime
            "C:\Program Files\OpenSSL-Win64\bin"               # OpenSSL
            "C:\ProgramData\chocolatey\lib\curl\tools"         # libcurl
            "C:\deps"                                          # libpq (installed by deps script)
          )
          $dll_patterns = @(
            "libgcc_s_seh-1.dll","libstdc++-6.dll","libwinpthread-1.dll",
            "libcrypto-*.dll","libssl-*.dll",
            "libcurl-*.dll","curl-*.dll",
            "libpq.dll","libpq*.dll",
            "zlib1.dll","libzstd.dll"
          )
          foreach ($dir in $dll_dirs) {
            if (Test-Path $dir) {
              foreach ($pat in $dll_patterns) {
                Get-ChildItem "$dir\$pat" -ErrorAction SilentlyContinue | ForEach-Object {
                  Copy-Item $_.FullName "dist/$PKG/" -Force -ErrorAction SilentlyContinue
                }
              }
            }
          }
          Write-Host "Bundle: copied runtime DLLs to dist/$PKG/"

          Push-Location dist
          & 7z a -tzip "..\$PKG.zip" $PKG
          Pop-Location
          $hash = (Get-FileHash "$PKG.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content "$PKG.zip.sha256" "$hash  $PKG.zip"

          $tag = $env:APPVEYOR_REPO_TAG_NAME
          if (-not $tag) { exit 0 }
          $headers = @{ Authorization = "token $env:GITHUB_TOKEN"; "User-Agent" = "appveyor-varian" }
          $all = Invoke-RestMethod "https://api.github.com/repos/$env:APPVEYOR_REPO_NAME/releases?per_page=100" -Headers $headers
          $rel = $all | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1
          if (-not $rel) { Write-Host "Release not found for $tag"; exit 1 }
          $upload = "https://uploads.github.com/repos/$env:APPVEYOR_REPO_NAME/releases/$($rel.id)/assets"
          foreach ($f in @("$PKG.zip", "$PKG.zip.sha256")) {
            $name = [System.IO.Path]::GetFileName($f)
            Invoke-RestMethod -Uri "$upload?name=$name" -Method Post -Headers $headers `
              -ContentType "application/octet-stream" -InFile $f
            Write-Host "Uploaded $name"
          }

artifacts:
  - path: varian-linux-x64.tar.gz
    name: varian-linux-x64
  - path: varian-linux-x64.tar.gz.sha256
    name: varian-linux-x64-sha256
  - path: varian-macos-x64.tar.gz
    name: varian-macos-x64
  - path: varian-macos-x64.tar.gz.sha256
    name: varian-macos-x64-sha256
  - path: varian-windows-x64.zip
    name: varian-windows-x64
  - path: varian-windows-x64.zip.sha256
    name: varian-windows-x64-sha256
