# AppVeyor CI — builds the Linux `vn` toolchain and publishes to GitHub
# Releases whenever a vX.Y.Z tag is pushed.
#
# Setup (one-time):
#   1. https://ci.appveyor.com/ → Log in with GitHub → New Project → pick Chidi09/VarianLang
#   2. Settings → Environment → add secret: GITHUB_TOKEN (a classic PAT with repo scope)
#   3. Push a tag — AppVeyor picks it up automatically.

skip_non_tags: true

image: Ubuntu2204

clone_depth: 1

environment:
  GITHUB_TOKEN: $(GITHUB_TOKEN)

install:
  - sh: sudo apt-get update -qq
  - sh: >
      sudo apt-get install -y -qq
      build-essential
      libffi-dev
      libcurl4-openssl-dev
      libpq-dev
      libssl-dev
      libsqlite3-dev
      libhiredis-dev
      liburing-dev

build_script:
  - sh: make -j$(nproc) release

after_build:
  - sh: |
      set -e
      PKG=varian-linux-x64
      rm -rf dist && mkdir -p dist/$PKG
      cp vn libvarian.a dist/$PKG/
      cp -r include vn_modules dist/$PKG/
      cp README.md LICENSE dist/$PKG/ 2>/dev/null || true
      tar -czf $PKG.tar.gz -C dist $PKG
      sha256sum $PKG.tar.gz | tee $PKG.tar.gz.sha256

      # Upload to GitHub Release via API (like crush does)
      TAG="$APPVEYOR_REPO_TAG_NAME"
      if [ -z "$TAG" ]; then echo "No tag — skipping release upload"; exit 0; fi

      echo "Fetching release for tag $TAG..."
      REL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
        "https://api.github.com/repos/$APPVEYOR_REPO_NAME/releases/tags/$TAG")

      # If release doesn't exist yet, create it
      if echo "$REL" | grep -q '"message": "Not Found"'; then
        echo "Creating new release for $TAG..."
        REL=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"Varian v${TAG#v} — compiled, concurrent, batteries-included language.\\n\\nSee README.md and docs/ for full reference.\"}" \
          "https://api.github.com/repos/$APPVEYOR_REPO_NAME/releases")
      fi

      REL_ID=$(echo "$REL" | grep -o '"id": [0-9]*' | head -1 | cut -d' ' -f2)
      if [ -z "$REL_ID" ]; then echo "Failed to get release ID"; exit 1; fi
      echo "Release ID: $REL_ID"

      # Upload tarball
      echo "Uploading $PKG.tar.gz..."
      curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
        -H "Content-Type: application/gzip" \
        --data-binary @"$PKG.tar.gz" \
        "https://uploads.github.com/repos/$APPVEYOR_REPO_NAME/releases/$REL_ID/assets?name=$PKG.tar.gz"

      # Upload checksum
      echo "Uploading $PKG.tar.gz.sha256..."
      curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
        -H "Content-Type: text/plain" \
        --data-binary @"$PKG.tar.gz.sha256" \
        "https://uploads.github.com/repos/$APPVEYOR_REPO_NAME/releases/$REL_ID/assets?name=$PKG.tar.gz.sha256"

      echo "Release published."

artifacts:
  - path: varian-linux-x64.tar.gz
    name: varian-linux-x64
  - path: varian-linux-x64.tar.gz.sha256
    name: varian-linux-x64-sha256
