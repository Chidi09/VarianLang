id = "varian"
name = "Varian"
description = "Varian language support for Zed: tree-sitter grammar, syntax highlighting, themes, file icons, and the Varian + Lumen languages."
version = "0.1.0"
schema_version = 1
authors = ["VarianLang"]
repository = "https://github.com/Chidi09/VarianLang"

# Languages, themes, and icon themes are auto-discovered from their
# respective subdirectories. They are listed here to keep the manifest
# self-describing; populate_defaults() will keep these in sync at load time.
languages = ["languages/Varian", "languages/Lumen"]
themes = ["themes/varian.json"]
icon_themes = ["icon_themes/varian.json"]

[grammars.varian]
repository = "https://github.com/Chidi09/tree-sitter-varian"
rev = "8a88f6edf98e6edf44a459540914a9d83be4b82f"

# NOTE: the Varian LSP (`vn lsp`) is provided by the SEPARATE `varian-lsp`
# extension (editors/zed-varian-lsp), which ships the Rust/WASM adapter that
# implements zed::Extension::language_server_command. It must NOT be declared
# here: a `[language_servers.*]` entry obligates THIS extension to implement
# the server in Rust, but this is a pure grammar/theme/icon extension with no
# Rust code — declaring it makes Zed fail to load the extension, so the grammar
# never registers and syntax highlighting silently disappears.
